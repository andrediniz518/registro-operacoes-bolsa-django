<!DOCTYPE html>
<html>
    <head>
        <title>Excluir Operação</title>
    </head>
<body>
    <h1>Excluir Operação</h1>

    <p>Tem certeza que deseja excluir esta operação?</p>
    <p>
        <strong>{{ operacao.ticker }}</strong>
        -
        {{ operacao.tipo }}
        -
        {{ operacao.quantidade }}
    </p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">
            Sim, Excluir
        </button>
    </form>

    <br>

    <a href="{% url 'home' %}">
        Cancelar
    </a>
    
</body>
</html>
